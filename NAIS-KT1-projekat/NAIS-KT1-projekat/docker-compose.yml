version: "3.3" # Defines the Docker Compose file format version

services:
  # Service Discovery: Keeps track of all microservices
  eureka-server:
    build: # Instructions for building a custom image from a local directory
      context: ./EurekaService # The directory containing the build files
      dockerfile: Dockerfile  # The specific file used to build the image
    image: eureka-server:latest # The name and tag given to the resulting image
    ports: # Maps host machine ports to container ports (HOST:CONTAINER)
      - "8761:8761"
    healthcheck: # A test to check if the container is running correctly
      # test: The actual command executed to verify the container's health
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s # How often to run the check
      timeout: 10s # How long to wait for a response
      retries: 5 # Number of failures before marking as unhealthy

  gateway-api:
    build:
      context: ./GatewayService
      dockerfile: Dockerfile
    image: gateway-api:latest
    environment: # Sets environment variables inside the container
      # Key-Value pairs used to configure the application environment at runtime
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on: # Ensures this service starts only after the listed services are running
      - eureka-server
    ports:
      - "9003:9000"


  graph-service:
    build:
      context: ./GraphDatabaseService
      dockerfile: Dockerfile
    image: graph-service:latest
    depends_on:
      - eureka-server
      - neo4j
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
    ports:
      - "9060:8080"

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes: # Mounts persistent storage or local folders into the container
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./VectorDatabaseService/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./VectorDatabaseService/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt: # Configures security settings (e.g., bypassing kernel restrictions)
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./VectorDatabaseService/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  attu:
    image: zilliz/attu:v2.4
    container_name: attu
    environment:
      MILVUS_URL: standalone:19530
    ports:
      - "8090:3000"
    depends_on:
      - standalone

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  vector-database-service:
    build:
      context: ./VectorDatabaseService
      dockerfile: Dockerfile
    image: vector-database-service:latest
    restart: on-failure
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
    ports:
      - "8000:8000"
    volumes:
      - ./VectorDatabaseService/data:/app/data:ro # ':ro' makes the volume Read-Only inside the container
    depends_on:
      - eureka-server
      - standalone
      - ollama

  streamlit:
    build:
      context: ./VectorDatabaseService
      dockerfile: Dockerfile.streamlit
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://vector-database-service:8000"
    depends_on:
      - vector-database-service
    restart: on-failure

volumes: # Declares named volumes for persistent data storage across container restarts
  neo4j_data: {}
  ollama_data: {}
