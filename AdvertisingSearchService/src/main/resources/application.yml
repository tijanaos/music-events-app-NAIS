server:
  port: 9080

spring:
  application:
    name: advertising-search-service
  elasticsearch:
    uris: http://localhost:9200
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

vector-service:
  base-url: ${VECTOR_SERVICE_BASE_URL:http://localhost:8000}

advertising:
  seed:
    force-reload: ${ADVERTISING_SEED_FORCE_RELOAD:true}
